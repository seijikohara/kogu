# GitHub Auto-generated Release Notes Configuration
#
# Labels are automatically assigned by .github/workflows/pr-labeler.yml
# based on PR title prefix (Conventional Commits format).
#
# Mapping: PR Title → Label → Release Category
#   feat:     → feature       → 🚀 Features
#   fix:      → fix           → 🐛 Bug Fixes
#   perf:     → performance   → ⚡ Performance
#   refactor: → refactor      → 🔧 Refactoring
#   test:     → test          → 🧪 Tests
#   docs:     → documentation → 📝 Documentation
#   chore:    → chore         → 🔨 Maintenance
#   ci:       → ci            → 🔨 Maintenance
#   build:    → build         → 🔨 Maintenance

changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - renovate
      - renovate[bot]
  categories:
    - title: '🚀 Features'
      labels:
        - feature
    - title: '🐛 Bug Fixes'
      labels:
        - fix
    - title: '⚡ Performance'
      labels:
        - performance
    - title: '🔧 Refactoring'
      labels:
        - refactor
    - title: '🧪 Tests'
      labels:
        - test
    - title: '📝 Documentation'
      labels:
        - documentation
    - title: '📦 Dependencies'
      labels:
        - dependencies
    - title: '🔨 Maintenance'
      labels:
        - chore
        - ci
        - build
    - title: '🔨 Other Changes'
      labels:
        - '*'
