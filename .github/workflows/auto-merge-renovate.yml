name: Auto-Merge Renovate PRs

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled

jobs:
  auto-merge-renovate:
    name: Auto-Merge Renovate PRs
    runs-on: ubuntu-latest
    if: |
      github.actor == 'renovate[bot]' &&
      github.event.pull_request.user.login == 'renovate[bot]' &&
      github.event.pull_request.user.type == 'Bot'
    permissions:
      pull-requests: write
      contents: write
    timeout-minutes: 10

    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.DEV_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.DEV_AUTOMATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate_token.outputs.token }}

      # Renovate applies the `security` label to vulnerability-alert PRs
      # (configured via vulnerabilityAlerts.labels in renovate.json5).
      # These are kept out of auto-merge so a human can assess impact first.
      - name: Skip auto-merge for security updates
        if: contains(github.event.pull_request.labels.*.name, 'security')
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "🚨 Security update detected. Skipping auto-merge for manual review."
          gh pr comment "$PR_NUMBER" \
            --body "🚨 Security update detected. Skipping auto-merge for manual review."
          exit 1

      - name: Auto-approve and merge
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "✅ All checks passed. Auto-merging Renovate PR:"
          echo "  - Title: $PR_TITLE"
          echo "  - Number: #$PR_NUMBER"

          # Auto-approve the PR
          gh pr review "$PR_NUMBER" --approve \
            --body "✅ Auto-approved Renovate dependency update."

          # Enable auto-merge
          gh pr merge "$PR_NUMBER" --auto --rebase

          # Add success comment
          gh pr comment "$PR_NUMBER" \
            --body "🚀 Auto-merge enabled. Will merge once all checks pass."

      - name: Handle failures
        if: failure()
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "❌ Auto-merge failed"
          gh pr comment "$PR_NUMBER" \
            --body "❌ Auto-merge failed. Please check the workflow logs and consider manual review."
